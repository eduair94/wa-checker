[api]
# Your WhatsApp Proxy API key (required)
api_key = xxxx

# Base URL of the WhatsApp proxy API
base_url = https://whatsapp-proxy.checkleaked.cc

[rate_limit]
# Requests per second (recommended: 2-4 depending on your plan)
requests_per_second = 4

# Number of concurrent worker threads.  More workers = more requests
# in-flight at once.  The rate limiter still enforces the global RPS.
# Rule of thumb: workers ≈ requests_per_second × avg_latency_seconds
# With 4 rps and ~2s latency, 10 workers keeps the pipeline full.
workers = 10

# Maximum retry attempts for failed requests
max_retries = 5

# Initial backoff time in seconds when rate-limited (doubles each retry)
backoff_start = 2.0

[files]
# Path or URL to the input file with phone numbers (one per line)
# Can be a local file path or an HTTP/HTTPS URL
input_file = numbers.txt

# Output file for VALID WhatsApp numbers (full details, one line per number)
valid_output = results/valid.txt

# Output file for INVALID numbers (numbers that don't exist on WhatsApp)
invalid_output = results/invalid.txt

# Progress file used to resume interrupted sessions
progress_file = results/.progress.json
